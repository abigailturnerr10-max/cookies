<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid #222;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #222;
    }

    .orders {
      padding: 20px;
    }

    .order-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    select {
      margin-top: 10px;
      padding: 8px;
      background: #000;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
    }

    /* LOGIN SCREEN */
    #loginScreen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login">
  <div class="login-box">

    <h2>Admin Login</h2>

    <input type="password" id="adminPass" placeholder="Enter password" />

    <button onclick="checkLogin()">Login</button>

    <p id="error"></p>

  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <div class="header">
    <h1>ADMIN DASHBOARD</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="stats">
    <div class="card">
      <h2 id="totalOrders">0</h2>
      <p>Total Orders</p>
    </div>

    <div class="card">
      <h2 id="revenue">₦0</h2>
      <p>Total Revenue</p>
    </div>

    <div class="card">
      <h2 id="pending">0</h2>
      <p>Processing</p>
    </div>
  </div>

  <div class="orders" id="orders"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
